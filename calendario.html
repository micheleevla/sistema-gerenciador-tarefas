<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topo-kanban">
    <button onclick="voltarParaKanban()" class="btn-topo">Kanban</button>
    <button onclick="sair()" class="btn-topo">Sair</button>
</div>

<div class="calendario-wrapper">

    <h2>Calendário de Tarefas</h2>

    <div class="controles-calendario">
        <select id="mesSelect" class="input-calendario"></select>
        <select id="anoSelect" class="input-calendario"></select>
        <button onclick="gerarCalendario()" class="btn-topo">Atualizar</button>
    </div>

    <div id="calendario" class="calendario-box"></div>

</div>

<script src="calendario.js"></script>

<script>
function voltarParaKanban() {
    window.location.href = "kanban.html";
}

function sair() {
    localStorage.removeItem("usuarioLogado");
    window.location.href = "login.html";
}
</script>

</body>
</html>
